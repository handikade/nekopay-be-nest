name: Build and Deploy

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Grants permissions to GitHub token to publish packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Generates a tag with the branch name (main) and also sha
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-server:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Log in to GitHub Container Registry on your server
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Convert repo name to lowercase so docker pull works properly
            IMAGE_URL=$(echo "ghcr.io/${{ env.IMAGE_NAME }}:latest" | tr '[:upper:]' '[:lower:]')
            
            # Pull the new image
            docker pull $IMAGE_URL
            
            # Optional: Apply DB migrations before starting app
            # docker run --rm --env-file /opt/nekopay/.env $IMAGE_URL pnpm prisma migrate deploy
            
            # Stop and remove the old container
            docker stop nekopay-api || true
            docker rm nekopay-api || true
            
            # Run the new container
            # Make sure you have created /opt/nekopay/.env on the server with your DB URL
            docker run -d \
              --name nekopay-api \
              --network host \
              --env-file /opt/nekopay/.env \
              --restart unless-stopped \
              $IMAGE_URL
              
            # Clean up old unused images to save disk space
            docker image prune -af
